<!DOCTYPE html>
<html lang="en">
<head>
     
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance Portal</title>
    
    <!-- External CSS Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    
    <!-- আপনার নিজস্ব স্টাইল ফাইল (GitHub এ থাকা style.css) -->
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initApp()">

    <!-- Lang Selection -->
    <div class="lang-dropdown">
        <select id="langSelect" class="form-select form-select-sm bg-dark text-warning border-warning w-auto" onchange="changeLang()">
            <option value="en">EN</option><option value="bn">BN</option><option value="hi">HI</option>
        </select>
    </div>

    <!-- Login Page -->
    <div id="loginPage" class="container mt-5 pt-5">
        <div class="row justify-content-center text-center">
            <div class="col-md-5">
                <h1 style="color: var(--gold); font-weight: 900; letter-spacing: 3px;">SMART PORTAL</h1>
                <div class="premium-card text-start shadow mt-4">
                    <label class="small text-muted mb-1">Phone Number</label>
                    <input type="number" id="phone" class="form-control mb-3" placeholder="017xxxxxxxx">
                    <label class="small text-muted mb-1">4-Digit PIN</label>
                    <input type="password" id="pin" class="form-control mb-3" placeholder="****">
                    <button id="loginBtn" onclick="handleLogin('worker')" class="btn btn-gold w-100 py-2">WORKER LOGIN</button>
                    <hr class="border-secondary">
                    <button id="adminLoginBtn" onclick="handleLogin('admin')" class="btn btn-sm btn-outline-secondary w-100">ADMIN ACCESS</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="container mt-5 pt-4 hidden">
        <div class="menu-dropdown">
            <div class="dropdown">
                <button class="btn btn-gold btn-sm dropdown-toggle" data-bs-toggle="dropdown" id="txtMenu">MENU</button>
                <ul class="dropdown-menu dropdown-menu-end bg-dark border-secondary">
                    <li><a class="dropdown-item text-white" onclick="refreshSession()" id="txtRefresh">Refresh</a></li>
                    <li id="pinOpt"><a class="dropdown-item text-white" onclick="promptPin()" id="txtPin">Change PIN</a></li>
                    <li><hr class="dropdown-divider bg-secondary"></li>
                    <li><a class="dropdown-item text-danger" onclick="logout()" id="txtLogout">Logout</a></li>
                </ul>
            </div>
        </div>

        <!-- Worker Dashboard -->
        <div id="workerDash" class="hidden text-center">
            <img id="wMainPhoto" src="https://via.placeholder.com/100" class="profile-img-main mb-2">
            <h4 id="wNameDisp" class="text-warning fw-bold mb-3"></h4>
            <div class="premium-card shadow">
                <div class="row mb-3">
                    <div class="col-4 small text-muted"><span>EARNED</span><br><h5 id="wEarned" class="text-white">₹0</h5></div>
                    <div class="col-4 small text-muted"><span>PAID</span><br><h5 id="wPaid" class="text-white">₹0</h5></div>
                    <div class="col-4 small text-muted"><span>BALANCE</span><br><h5 id="wBalance" class="text-warning">₹0</h5></div>
                </div>
                <button id="actionBtn" onclick="toggleAttendance()" class="btn btn-lg w-100 shadow-sm" disabled>GPS Syncing...</button>
                <p id="gpsText" class="mt-3 text-muted small"></p>
            </div>
            
            <div class="row g-2 mt-2">
                <div class="col-6"><button class="btn btn-outline-warning btn-sm w-100" onclick="showLeaveModal()">Apply Leave</button></div>
                <div class="col-6"><button class="btn btn-outline-info btn-sm w-100" onclick="downloadMySlip()">Pay Slip</button></div>
            </div>

            <div id="leaveModal" class="premium-card hidden mt-3">
                <h6>Apply for Leave</h6>
                <input type="date" id="lvStart" class="form-control mb-2">
                <input type="date" id="lvEnd" class="form-control mb-2">
                <textarea id="lvReason" class="form-control mb-2" placeholder="Reason..."></textarea>
                <button class="btn btn-gold btn-sm w-100" onclick="submitMyLeave()">Submit Application</button>
            </div>
            
            <div class="premium-card mt-3">
                <select id="wReportMonth" class="form-select form-select-sm mb-3" onchange="loadWorkerReport()"></select>
                <div class="row text-center small">
                    <div class="col-2 text-success">Full<br><b id="statFull" class="fs-5">0</b></div>
                    <div class="col-2 text-info">Half<br><b id="statHalf" class="fs-5">0</b></div>
                    <div class="col-2 text-warning">Quar<br><b id="statQuarter" class="fs-5">0</b></div>
                    <div class="col-3 text-warning">Hol<br><b id="statHoliday" class="fs-5">0</b></div>
                    <div class="col-2 text-danger">Abs<br><b id="statAbsent" class="fs-5">0</b></div>
                </div>
            </div>

            <div class="premium-card">
                <h6 class="text-warning small mb-3">HOLIDAY CALENDAR</h6>
                <div id="holidayCalendarContainer"></div>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminDash" class="hidden">
            <h4 class="text-warning fw-bold mb-4">ADMIN CONSOLE</h4>
            <ul class="nav nav-tabs mb-4 justify-content-center border-0" id="adminTabs">
                <li class="nav-item"><a class="nav-link active" onclick="switchTab('tabWorkers')">Workers</a></li>
                <li class="nav-item"><a class="nav-link" onclick="switchTab('tabStores')">Stores</a></li>
                <li class="nav-item"><a class="nav-link" onclick="switchTab('tabReports')">Payroll</a></li>
                <li class="nav-item"><a class="nav-link" onclick="switchTab('tabLeaves')">Leaves <span id="leaveBadge" class="badge bg-danger hidden">0</span></a></li>
            </ul>

            <!-- Admin Tabs Content (Workers, Stores, Reports) -->
            <div id="tabWorkers" class="admin-tab">
                <button class="btn btn-gold btn-sm w-100 mb-3" onclick="openWorkerForm(true)">+ ADD NEW WORKER</button>
                <div id="workerList"></div>
            </div>

            <div id="tabStores" class="admin-tab hidden">
                <button class="btn btn-gold btn-sm w-100 mb-3" onclick="openStoreForm(true)">+ ADD NEW STORE</button>
                <div id="storeList"></div>
            </div>

            <div id="tabReports" class="admin-tab hidden">
                <div class="premium-card">
                    <select id="adminReportMonth" class="form-select mb-3 w-auto" onchange="loadAdminReport()"></select>
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-sm">
                            <thead><tr><th>Name</th><th>F/H/Q/A</th><th>Bal</th></tr></thead>
                            <tbody id="adminReportBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Crop Modal -->
    <div id="cropModal">
        <div class="crop-content">
            <h6 class="text-warning mb-3">CROP & ROTATE</h6>
            <div style="max-height:350px; overflow:hidden;"><img id="cropTarget" style="max-width:100%;"></div>
            <div class="d-flex justify-content-between mt-4">
                <button class="btn btn-danger btn-sm px-4" onclick="closeCrop()">CANCEL</button>
                <button class="btn btn-success btn-sm px-4" onclick="finishCrop()">APPLY</button>
            </div>
        </div>
    </div>

    <!-- JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <!-- আপনার নিজস্ব জাভাস্ক্রিপ্ট ফাইল (GitHub এ থাকা script.js) -->
    <script src="script.js"></script>
</body>
</html>
